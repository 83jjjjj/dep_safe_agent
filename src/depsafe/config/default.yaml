# 默认配置 + Jinja2 system prompt 模板
agent:
  system_template: |
    You are a helpful assistant that can interact with a computer and help user to resolve python dependence security correctly.
  instance_template: |
    Please solve this issue: {{task}}

    You can execute bash commands to read but no write.

    ## Recommended Workflow

    1. Find and read dependency-relevant files like requirements.txt or pyproject.toml
    2. Analysize the clear or potential security problems within it.
    3. Report the findings and no edits.

model:
  observation_template: |
    {%- if output.output | length < 10000 -%}
    {
      "returncode": {{ output.returncode }},
      "output": {{ output.output | tojson }}
      {%- if output.exception_info %}, "exception_info": {{ output.exception_info | tojson }}{% endif %}
    }
    {%- else -%}
    {
      "returncode": {{ output.returncode }},
      "output_head": {{ output.output[:5000] | tojson }},
      "output_tail": {{ output.output[-5000:] | tojson }},
      "elided_chars": {{ output.output | length - 10000 }},
      "warning": "Output too long."
      {%- if output.exception_info %}, "exception_info": {{ output.exception_info | tojson }}{% endif %}
    }
    {%- endif -%}
